<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Leaf shape -->
  <ellipse cx="256" cy="200" rx="100" ry="130" fill="white" opacity="0.95" transform="rotate(-20 256 200)"/>
  <ellipse cx="256" cy="200" rx="100" ry="130" fill="white" opacity="0.95" transform="rotate(20 256 200)"/>
  <!-- Stem -->
  <line x1="256" y1="180" x2="256" y2="400" stroke="#2e7d32" stroke-width="22" stroke-linecap="round"/>
  <!-- Center vein -->
  <line x1="256" y1="120" x2="256" y2="280" stroke="#2e7d32" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
</svg>
